<!DOCTYPE html>
<html lang="ja">
    <head>
        <title>株式会社NSP</title>
        <meta charset="UTF-8">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
        <style>
            
            :root 
            {
                --font-weight-default: 400;
                --font-weight-bolder: 500;
                --font-weight-boldest: 700;
                --font-size-default: 24px;
                --font-size-h1: 40px;
                --font-size-h2: 32px;
                --line-height-normal: 1.5;
                --color-default: #252E36;
                --color-strong: #0B1014;
                font-family: "Noto Sans JP", sans-serif;
                font-optical-sizing: auto;
                font-weight: 400;
                font-style: normal;
                font-size: var(--font-size-default);
            }

            body { margin: 0; }

            .wrapper 
            {
                display: flex; height: 100vh;
                align-items: center; justify-content: center;
            }
            
            .overview { width: 40%; min-width: 600px; }

            .overview h1
            {
                font-weight: var(--font-weight-boldest);
                font-size: var(--font-size-h1);
                line-height: var(--line-height-normal);
            }

            .overview h2
            {
                font-weight: var(--font-weight-bolder);
                font-size: var(--font-size-h2);
            }

            .overview table { width: 100%; border-collapse: collapse; }

            .overview table tr { height: 64px; }

            .overview table tbody tr td:first-child { font-weight: var(--font-weight-bolder); }

            .overview table tbody tr td
            {
                line-height: var(--line-height-normal);
                border-bottom: 1px solid rgba(0,0,0,.2);
            }
        </style>
    </head>
